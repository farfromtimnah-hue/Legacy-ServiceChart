<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legacy — Equipe de Ministério</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --crimson:#C8214A; --orange:#E87D1A; --chartreuse:#C8E84A; --chartreuse-dim:#9db535;
    --dark:#0d0d0d; --dark-card:#161616; --dark-border:#252525; --dark-hover:#1c1c1c;
    --text-primary:#f0f0f0; --text-muted:#5a5a5a; --text-dim:#2e2e2e;
    --op:#22c55e; --op-bg:rgba(34,197,94,0.1); --op-border:rgba(34,197,94,0.25);
    --tr:#f59e0b; --tr-bg:rgba(245,158,11,0.1); --tr-border:rgba(245,158,11,0.25);
    --sh:#60a5fa; --sh-bg:rgba(96,165,250,0.1); --sh-border:rgba(96,165,250,0.25);
    --font-d:'Bebas Neue',sans-serif; --font-b:'DM Sans',sans-serif; --font-m:'Space Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--text-primary);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;}
  .hdr{padding:26px 40px 18px;border-bottom:1px solid var(--dark-border);display:flex;align-items:center;gap:18px;}
  .logo{width:58px;height:58px;background:var(--crimson);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:25px;color:var(--chartreuse);flex-shrink:0;position:relative;overflow:hidden;}
  .logo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent 55%);}
  .hdr-txt h1{font-family:var(--font-d);font-size:32px;letter-spacing:4px;line-height:1;}
  .hdr-txt p{font-family:var(--font-m);font-size:10px;color:var(--text-muted);letter-spacing:2px;margin-top:3px;}
  .hdr-r{margin-left:auto;}
  .lang-tog{display:flex;border:1px solid var(--dark-border);border-radius:4px;overflow:hidden;}
  .lang-btn{padding:7px 14px;font-family:var(--font-m);font-size:11px;letter-spacing:1px;background:transparent;color:var(--text-muted);border:none;cursor:pointer;transition:all .15s;}
  .lang-btn.on{background:var(--crimson);color:#fff;}
  .legend{padding:10px 40px;border-bottom:1px solid var(--dark-border);display:flex;align-items:center;gap:16px;background:rgba(0,0,0,.2);flex-wrap:wrap;}
  .leg-lbl{font-family:var(--font-m);font-size:10px;color:var(--text-muted);letter-spacing:1px;}
  .leg-item{display:flex;align-items:center;gap:6px;font-family:var(--font-m);font-size:10px;}
  .ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .ldot-op{background:var(--op);box-shadow:0 0 5px var(--op);}
  .ldot-tr{background:var(--tr);box-shadow:0 0 5px var(--tr);}
  .ldot-sh{background:var(--sh);box-shadow:0 0 5px var(--sh);}
  .ldot-va{background:transparent;border:1px solid #444;}
  .tabs{padding:15px 40px;border-bottom:1px solid var(--dark-border);display:flex;gap:6px;background:rgba(0,0,0,.25);}
  .tab{padding:9px 22px;border-radius:4px;border:1px solid var(--dark-border);background:transparent;color:var(--text-muted);font-family:var(--font-d);font-size:15px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
  .tab .sub{font-family:var(--font-m);font-size:9px;letter-spacing:1px;display:block;margin-bottom:1px;opacity:.65;}
  .tab:hover{border-color:#444;color:#aaa;}
  .as1{background:var(--crimson)!important;border-color:var(--crimson)!important;color:#fff!important;}
  .as2{background:var(--orange)!important;border-color:var(--orange)!important;color:#fff!important;}
  .as3{background:var(--chartreuse)!important;border-color:var(--chartreuse)!important;color:var(--dark)!important;}
  .prog-bar{padding:12px 40px;display:flex;align-items:center;gap:20px;border-bottom:1px solid var(--dark-border);}
  .stg-ttl{font-family:var(--font-d);font-size:19px;letter-spacing:3px;}
  .c1{color:var(--crimson);}.c2{color:var(--orange);}.c3{color:var(--chartreuse);}
  .stg-dsc{font-family:var(--font-m);font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-top:2px;}
  .prog-r{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .prog-track{width:175px;height:5px;background:var(--dark-border);border-radius:3px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:3px;transition:width .5s ease;}
  .pf1{background:var(--crimson);}.pf2{background:var(--orange);}.pf3{background:var(--chartreuse);}
  .prog-pct{font-family:var(--font-m);font-size:11px;color:var(--text-muted);min-width:58px;text-align:right;}
  .main{padding:26px 40px;display:flex;flex-direction:column;gap:22px;}
  .dept{border:1px solid var(--dark-border);border-radius:8px;overflow:hidden;background:var(--dark-card);}
  .dept-hdr{padding:11px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--dark-border);background:rgba(0,0,0,.3);}
  .dept-icon{font-size:17px;}
  .dept-name{font-family:var(--font-d);font-size:17px;letter-spacing:3px;}
  .dept-meta{margin-left:auto;display:flex;gap:10px;align-items:center;}
  .dstat{display:flex;align-items:center;gap:4px;font-family:var(--font-m);font-size:10px;color:var(--text-muted);}
  .ddot{width:6px;height:6px;border-radius:50%;}
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:var(--dark-border);}
  .slot{background:var(--dark-card);padding:13px 15px 11px;position:relative;display:flex;flex-direction:column;gap:5px;transition:background .12s;}
  .slot:hover{background:var(--dark-hover);}
  .slot.appear{animation:ap .3s ease forwards;}
  @keyframes ap{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .slot.optional{opacity:.38;}
  .slot.optional .opt-badge{display:inline-block;}
  .opt-badge{display:none;font-family:var(--font-m);font-size:9px;letter-spacing:1px;color:var(--text-muted);border:1px dashed var(--dark-border);border-radius:2px;padding:1px 6px;margin-top:2px;}
  .slot-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .slot-ttl{font-size:13px;font-weight:700;line-height:1.3;}
  .slot-sub{font-size:10px;color:var(--text-muted);font-style:italic;margin-top:1px;}
  .people{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
  .person-row{display:flex;align-items:center;gap:7px;}
  .pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .pdot-op{background:var(--op);box-shadow:0 0 6px var(--op);}
  .pdot-tr{background:var(--tr);box-shadow:0 0 6px var(--tr);}
  .pdot-sh{background:var(--sh);box-shadow:0 0 6px var(--sh);}
  .pdot-va{background:transparent;border:1px solid #3a3a3a;}
  .pname{font-family:var(--font-m);font-size:11px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pname-op{color:var(--op);}.pname-tr{color:var(--tr);}.pname-sh{color:var(--sh);}
  .p-del{background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:12px;padding:0 2px;line-height:1;transition:color .12s;flex-shrink:0;}
  .p-del:hover{color:#888;}
  .vacant-lbl{font-family:var(--font-m);font-size:10px;color:var(--text-dim);margin-top:2px;}
  .add-btn{display:flex;align-items:center;gap:5px;margin-top:6px;padding:5px 0;background:transparent;border:none;cursor:pointer;font-family:var(--font-m);font-size:10px;color:var(--text-muted);letter-spacing:1px;transition:color .12s;}
  .add-btn:hover{color:var(--text-primary);}
  .add-btn .plus{width:16px;height:16px;border-radius:3px;border:1px solid var(--dark-border);display:flex;align-items:center;justify-content:center;font-size:11px;line-height:1;transition:border-color .12s;}
  .add-btn:hover .plus{border-color:#555;}
  .add-form{display:none;flex-direction:column;gap:7px;margin-top:6px;padding-top:8px;border-top:1px solid var(--dark-border);}
  .add-form.open{display:flex;}
  .af-inp{background:#0a0a0a;border:1px solid var(--dark-border);border-radius:3px;padding:5px 9px;font-family:var(--font-m);font-size:11px;color:var(--text-primary);outline:none;width:100%;}
  .af-inp:focus{border-color:var(--crimson);}
  .af-inp::placeholder{color:var(--text-dim);}
  .af-row{display:flex;gap:5px;align-items:center;justify-content:space-between;}
  .sbtn-wrap{display:flex;gap:4px;}
  .sbtn{width:26px;height:26px;border-radius:3px;border:1px solid var(--dark-border);background:transparent;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
  .sbtn:hover{border-color:#555;}
  .sbtn.s-op{background:var(--op-bg);border-color:var(--op);}
  .sbtn.s-tr{background:var(--tr-bg);border-color:var(--tr);}
  .sbtn.s-sh{background:var(--sh-bg);border-color:var(--sh);}
  .af-actions{display:flex;gap:4px;}
  .btn-save{background:var(--crimson);border:none;border-radius:3px;color:#fff;padding:5px 10px;font-family:var(--font-m);font-size:10px;cursor:pointer;}
  .btn-cancel{background:transparent;border:1px solid var(--dark-border);border-radius:3px;color:#666;padding:5px 8px;font-family:var(--font-m);font-size:10px;cursor:pointer;}
  .btn-cancel:hover{border-color:#555;color:#999;}
  .stag{font-family:var(--font-m);font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:2px;display:inline-block;margin-top:3px;}
  .st2{background:rgba(232,125,26,.1);color:var(--orange);border:1px solid rgba(232,125,26,.2);}
  .st3{background:rgba(200,232,74,.07);color:var(--chartreuse-dim);border:1px solid rgba(200,232,74,.18);}
  .summary{padding:18px 40px;display:flex;gap:22px;border-top:1px solid var(--dark-border);background:rgba(0,0,0,.3);flex-wrap:wrap;align-items:center;}
  .ss{display:flex;flex-direction:column;gap:2px;}
  .sn{font-family:var(--font-d);font-size:28px;letter-spacing:2px;line-height:1;}
  .sl{font-family:var(--font-m);font-size:9px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;}
  .sdiv{width:1px;height:34px;background:var(--dark-border);}
  .snudge{margin-left:auto;font-family:var(--font-m);font-size:10px;color:var(--text-muted);letter-spacing:1px;text-align:right;}
  .hint{text-align:center;padding:9px 40px;font-family:var(--font-m);font-size:9px;color:var(--text-dim);letter-spacing:1px;border-top:1px solid var(--dark-border);}
  @media(max-width:640px){
    .hdr,.legend,.tabs,.prog-bar,.main,.summary{padding-left:16px;padding-right:16px;}
    .roster{grid-template-columns:1fr 1fr;}
    .prog-track{width:100px;}
    .tab{padding:8px 11px;font-size:13px;}
  }
</style>
</head>

    {id:'m-lyrics',s:1},{id:'m-lights',s:1},{id:'m-sound',s:1},{id:'m-stream',s:1},
    {id:'m-ls1',s:2,bonus:true},{id:'m-ls2',s:2,bonus:true},
    {id:'m-cam1',s:2,bonus:true},{id:'m-cam2',s:2,bonus:true},{id:'m-cam3',s:2,bonus:true},
    {id:'m-lyrics-b',s:3,d:1},{id:'m-sound-b',s:3,d:1},
  ]},
  {id:'content',icon:'📸',slots:[
    {id:'c-photo',s:1},{id:'c-social',s:1},
    {id:'c-photo-b',s:3,d:1},{id:'c-social-b',s:3,d:1},
  ]},
  {id:'stage',icon:'🎤',slots:[
    {id:'s-stage',s:1},{id:'s-setup',s:1},
    {id:'s-stage-b',s:3,d:1},{id:'s-setup-b',s:3,d:1},
  ]},
  {id:'hosp',icon:'☕',slots:[
    {id:'h-cafe',s:1},{id:'h-wel1',s:1},{id:'h-wel2',s:1},
    {id:'h-wel3',s:2,bonus:true},{id:'h-wel4',s:2,bonus:true},{id:'h-wel5',s:2,bonus:true},{id:'h-wel6',s:2,bonus:true},
    {id:'h-cafe-b',s:3,d:1},
  ]},
];
let lang='pt',stage=1,openForm=null,pendSt={};
let data=JSON.parse(localStorage.getItem('legacy_v3')||'{}');
const SC=['','c1','c2','c3'],PF=['','pf1','pf2','pf3'],TA=['','as1','as2','as3'];
function scColor(s){return s==='op'?'var(--op)':s==='train'?'var(--tr)':s==='shadow'?'var(--sh)':'var(--text-muted)';}
function dotClass(s){return 'pdot pdot-'+(s==='op'?'op':s==='train'?'tr':s==='shadow'?'sh':'va');}
function isBonus(sl){return stage===1&&sl.s===2&&sl.bonus;}
function isVisible(sl){if(stage===1)return sl.s===1||(sl.s===2&&sl.bonus);if(stage===2)return sl.s<=2;return sl.s<=3;}
function allSlots(stg){const cap=stg===1?1:stg===2?2:3;return DEPTS.flatMap(d=>d.slots.filter(sl=>sl.s<=cap&&!(stg===1&&sl.bonus)));}
function persist(){localStorage.setItem('legacy_v3',JSON.stringify(data));}
function render(){
  const t=T[lang];
  document.getElementById('h-sub').textContent=t.sub;
  document.getElementById('l-op').textContent=t.lop;document.getElementById('l-tr').textContent=t.ltr;
  document.getElementById('l-sh').textContent=t.lsh;document.getElementById('l-va').textContent=t.lva;
  document.getElementById('t1s').textContent=t.t1s;document.getElementById('t1n').textContent=t.t1n;
  document.getElementById('t2s').textContent=t.t2s;document.getElementById('t2n').textContent=t.t2n;
  document.getElementById('t3s').textContent=t.t3s;document.getElementById('t3n').textContent=t.t3n;
  document.getElementById('hint').textContent=t.hint;
  document.getElementById('sl-op').textContent=t.lop;document.getElementById('sl-tr').textContent=t.ltr;
  document.getElementById('sl-sh').textContent=t.lsh;document.getElementById('sl-va').textContent=t.lva;
  [1,2,3].forEach(s=>{document.getElementById('tab-'+s).className='tab'+(s===stage?' '+TA[s]:'');});
  const cfg=t.stg[stage-1];
  const ttl=document.getElementById('s-ttl');ttl.textContent=cfg.t;ttl.className='stg-ttl '+SC[stage];
  document.getElementById('s-dsc').textContent=cfg.d;
  document.getElementById('pfill').className='prog-fill '+PF[stage];
  const main=document.getElementById('main');main.innerHTML='';
  let tot=0,cop=0,ctr=0,csh=0,cva=0;
  DEPTS.forEach(dept=>{
    const slots=dept.slots.filter(sl=>isVisible(sl));
    if(!slots.length)return;
    const req=slots.filter(sl=>!isBonus(sl));
    const dop=req.filter(sl=>(data[sl.id]||[]).some(p=>p.status==='op')).length;
    const dtr=req.filter(sl=>(data[sl.id]||[]).some(p=>p.status==='train')).length;
    const dsh=req.filter(sl=>(data[sl.id]||[]).some(p=>p.status==='shadow')).length;
    const dva=req.filter(sl=>!(data[sl.id]||[]).length).length;
    tot+=req.length;cop+=dop;ctr+=dtr;csh+=dsh;cva+=dva;
    const de=document.createElement('div');de.className='dept';
    de.innerHTML=`<div class="dept-hdr"><span class="dept-icon">${dept.icon}</span><span class="dept-name">${t.depts[dept.id]}</span><div class="dept-meta">${dop?`<div class="dstat"><div class="ddot" style="background:var(--op);box-shadow:0 0 4px var(--op)"></div>${dop}</div>`:''} ${dtr?`<div class="dstat"><div class="ddot" style="background:var(--tr);box-shadow:0 0 4px var(--tr)"></div>${dtr}</div>`:''} ${dsh?`<div class="dstat"><div class="ddot" style="background:var(--sh);box-shadow:0 0 4px var(--sh)"></div>${dsh}</div>`:''}<div class="dstat">${req.length-dva}/${req.length}</div></div></div><div class="roster" id="r-${dept.id}"></div>`;
    main.appendChild(de);
    const re=document.getElementById('r-'+dept.id);
    slots.forEach(sl=>{
      const people=data[sl.id]||[];const bonus=isBonus(sl);
      const isNew=sl.s===stage&&stage>1&&!bonus;
      const si=t.slots[sl.id]||[sl.id,''];
      let stageTag='';
      if(sl.s===2&&stage>=2)stageTag=`<span class="stag st2">${t.tag2}</span>`;
      if(sl.s===3&&stage===3)stageTag=sl.d?`<span class="stag st3">${t.tag2x}</span>`:`<span class="stag st3">${t.tag3}</span>`;
      let peopleHtml=people.length?`<div class="people">`+people.map((p,i)=>`<div class="person-row"><div class="${dotClass(p.status)}"></div><span class="pname pname-${p.status==='op'?'op':p.status==='train'?'tr':'sh'}">${p.name}</span><button class="p-del" onclick="delPerson('${sl.id}',${i},event)">✕</button></div>`).join('')+`</div>`:`<div class="vacant-lbl">${t.vacant}</div>`;
      const selOp=pendSt[sl.id]==='op'?'s-op':'';const selTr=pendSt[sl.id]==='train'?'s-tr':'';const selSh=pendSt[sl.id]==='shadow'?'s-sh':'';
      const formOpen=openForm===sl.id?'open':'';
      const el=document.createElement('div');
      el.className='slot'+(isNew?' appear':'')+(bonus?' optional':'');
      el.id='slot-'+sl.id;
      el.innerHTML=`<div class="slot-top"><div><div class="slot-ttl">${si[0]}</div>${si[1]?`<div class="slot-sub">${si[1]}</div>`:''}</div></div>${bonus?`<span class="opt-badge">${t.opt}</span>`:''}${stageTag}${peopleHtml}<button class="add-btn" onclick="openAddForm('${sl.id}',event)"><span class="plus">+</span><span>${t.addBtn}</span></button><div class="add-form ${formOpen}" id="af-${sl.id}" onclick="event.stopPropagation()"><input class="af-inp" id="inp-${sl.id}" placeholder="${t.ph}"><div class="af-row"><div class="sbtn-wrap"><button class="sbtn ${selOp}" title="${t.st.op}" onclick="selStatus('${sl.id}','op')">🟢</button><button class="sbtn ${selTr}" title="${t.st.train}" onclick="selStatus('${sl.id}','train')">🟡</button><button class="sbtn ${selSh}" title="${t.st.shadow}" onclick="selStatus('${sl.id}','shadow')">🔵</button></div><div class="af-actions"><button class="btn-cancel" onclick="closeForm('${sl.id}')">${t.cancel}</button><button class="btn-save" onclick="savePerson('${sl.id}')">${t.save}</button></div></div></div>`;
      re.appendChild(el);
    });
  });
  const filled=tot-cva;const pct=tot>0?Math.round((filled/tot)*100):0;
  document.getElementById('pfill').style.width=pct+'%';document.getElementById('ppct').textContent=filled+' / '+tot;
  document.getElementById('s-op').textContent=cop;document.getElementById('s-tr').textContent=ctr;
  document.getElementById('s-sh').textContent=csh;document.getElementById('s-va').textContent=cva;
  const nudge=document.getElementById('nudge');
  if(stage<3&&cva===0){nudge.innerHTML=T[lang].nr1+(stage+1);nudge.style.color=stage===1?'var(--orange)':'var(--chartreuse)';}
  else if(stage<3){nudge.innerHTML=T[lang].nr2+' '+(allSlots(stage+1).length-tot)+' '+T[lang].nr3;nudge.style.color='var(--text-dim)';}
  else{nudge.innerHTML=T[lang].nrf;nudge.style.color='var(--chartreuse)';}
}
function openAddForm(slotId,e){
  if(e)e.stopPropagation();
  if(openForm&&openForm!==slotId)closeForm(openForm);
  const af=document.getElementById('af-'+slotId);if(!af)return;
  if(af.classList.contains('open')){closeForm(slotId);return;}
  af.classList.add('open');openForm=slotId;
  if(!pendSt[slotId])pendSt[slotId]='op';
  refreshSBtns(slotId);
  setTimeout(()=>document.getElementById('inp-'+slotId)?.focus(),40);
}
function closeForm(slotId){
  const af=document.getElementById('af-'+slotId);if(af)af.classList.remove('open');
  const inp=document.getElementById('inp-'+slotId);if(inp)inp.value='';
  delete pendSt[slotId];if(openForm===slotId)openForm=null;
}
function selStatus(slotId,s){pendSt[slotId]=s;refreshSBtns(slotId);}
function refreshSBtns(slotId){
  const s=pendSt[slotId];const af=document.getElementById('af-'+slotId);if(!af)return;
  af.querySelectorAll('.sbtn').forEach(b=>{
    b.className='sbtn';const e=b.textContent.trim();
    if(e==='🟢'&&s==='op')b.classList.add('s-op');
    if(e==='🟡'&&s==='train')b.classList.add('s-tr');
    if(e==='🔵'&&s==='shadow')b.classList.add('s-sh');
  });
}
function savePerson(slotId){
  const nm=document.getElementById('inp-'+slotId)?.value.trim();if(!nm)return;
  const st=pendSt[slotId]||'op';
  if(!data[slotId])data[slotId]=[];
  data[slotId].push({name:nm,status:st});persist();closeForm(slotId);render();
}
function delPerson(slotId,idx,e){
  if(e)e.stopPropagation();if(!data[slotId])return;
  data[slotId].splice(idx,1);if(!data[slotId].length)delete data[slotId];persist();render();
}
function setStage(s){if(openForm)closeForm(openForm);stage=s;render();}
function setLang(l){
  lang=l;
  document.getElementById('btn-pt').className='lang-btn'+(l==='pt'?' on':'');
  document.getElementById('btn-en').className='lang-btn'+(l==='en'?' on':'');
  render();
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&openForm)savePerson(openForm);
  if(e.key==='Escape'&&openForm)closeForm(openForm);
});
render();
</script>
</body>
</html>
